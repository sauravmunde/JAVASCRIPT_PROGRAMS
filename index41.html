


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Galaxy View with Sirius</title>
  <style>
    body {
   
      margin: 0;
   
      background: black;
   
      overflow: hidden;
   
    }

    .galaxy {
   
      position: relative;
   
      width: 100vw;
   
      height: 100vh;
   
      background: radial-gradient(ellipse at center, #000 0%, #111 100%);
    }

    .star {

      position: absolute;

      width: 2px;
      
      height: 2px;
      
      background: white;
      
      border-radius: 50%;
      
      animation: twinkle 2s infinite ease-in-out alternate;

    }

    @keyframes twinkle {
 
      from { opacity: 0.3; transform: scale(1); }
 
      to { opacity: 1; transform: scale(1.5); }
 
    }

    .sirius {
 
      position: absolute;
 
      top: 40%;
 
      left: 50%;
 
      width: 8px;
 
      height: 8px;
 
      background: #00ccff;
 
      border-radius: 50%;
 
      box-shadow: 0 0 10px #00ccff, 0 0 20px #00ccff;
    }

    .label {
     
      position: absolute;
     
      top: 42%;
     
      left: 52%;
     
      color: white;
     
      font-family: sans-serif;
     
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="galaxy" id="galaxy">

    <div class="sirius"></div>

    <div class="label">Sirius</div>
    
  </div>

  <script>
    // Generate random stars
    const galaxy = document.getElementById('galaxy');

    for (let i = 0; i < 200; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.top = Math.random() * 100 + 'vh';
      star.style.left = Math.random() * 100 + 'vw';
      star.style.animationDuration = (1 + Math.random() * 2) + 's';
      galaxy.appendChild(star);
    }
  </script>
</body>
</html>
